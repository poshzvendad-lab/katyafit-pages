<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Страница не найдена | KatyaFit</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="favicon.svg?v=4.0.24" type="image/svg+xml">
    <link rel="icon" href="favicon.png?v=4.0.24" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=4.0.24">
    <meta name="theme-color" content="#1a1f1c">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'unsafe-inline'; img-src 'self'; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f5f0;
            color: #1a1f1c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 2rem;
        }
        .error-box { max-width: 480px; }
        .error-code {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: clamp(5rem, 18vw, 8rem);
            font-weight: 600;
            line-height: 1;
            color: #232823;
            letter-spacing: -4px;
        }
        .error-code span { color: #c9a96e; }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 1.25rem 0 0.75rem;
            color: #232823;
        }
        p { color: #6a645e; line-height: 1.65; margin-bottom: 2rem; }
        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #c9a96e;
            color: #1a1f1c;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(201, 169, 110, 0.18);
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .btn-home:hover { background: #b8964f; transform: scale(1.03); }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-code">4<span>0</span>4</div>
        <h1>Такой страницы нет</h1>
        <p>Возможно, страница была перемещена или вы перешли по устаревшей ссылке. Давайте вернёмся к программе тренировок и питания.</p>
        <a href="/" class="btn-home">На главную</a>
    </div>
</body>
</html>
